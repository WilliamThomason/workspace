<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Business &amp; Finance Speaking Lesson | Eloquenta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020617;
  --bg2:#0f172a;
  --bg3:#1e293b;
  --bg-card:#0f172a;
  --bg-hover:#1e293b;
  --border:#1e3a5f;
  --border-light:#2a4a7f;
  --text:#e0f2fe;
  --text-muted:#94a3b8;
  --text-dim:#4a6080;
  --accent:#22d3ee;
  --accent-dim:rgba(34,211,238,.08);
  --accent-glow:rgba(34,211,238,.35);
  --amber:#fbbf24;
  --green:#34d399;
  --rose:#fb7185;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;height:auto}
.slide{display:none;width:100vw;min-height:100vh;height:auto;position:relative;flex-direction:column;justify-content:center;align-items:center;background-size:cover;background-position:center;background-color:var(--bg2)}
.slide.active{display:flex}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.3) saturate(1.15)}
.slide-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.25) 40%,rgba(0,0,0,.55) 100%)}
.loading{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--accent);font-family:'Inter',sans-serif;font-size:1rem;letter-spacing:1px}
.loading.hidden{display:none}
.slide-content{position:relative;z-index:2;max-width:820px;padding:40px;text-align:center;max-height:calc(100vh - 120px);overflow-y:auto}
.slide-number{position:absolute;top:24px;left:28px;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase}
.slide-category{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(251,191,36,.15);color:#fbbf24;margin-bottom:20px;border:1px solid rgba(251,191,36,.25)}
.slide h1{font-size:3.2rem;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:8px}
.slide h2{font-size:1.5rem;font-weight:600;line-height:1.4;margin-bottom:16px;color:rgba(255,255,255,.9)}
.slide p{font-size:1.1rem;color:rgba(255,255,255,.6);line-height:1.7;max-width:600px;margin:0 auto}
.vocab-word{border-bottom:2px dotted rgba(251,191,36,.5);cursor:help;color:#fbbf24;font-weight:600;position:relative;transition:border-color .2s}
.vocab-word:hover{border-bottom-color:#fbbf24}
.vocab-word .tt{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 14px;min-width:200px;max-width:300px;font-size:13px;font-weight:400;color:#e2e8f0;line-height:1.5;text-align:left;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:100;transition:opacity .25s,visibility .25s;pointer-events:none}
.vocab-word .tt::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#334155}
.vocab-word .tt strong{display:block;color:#fbbf24;font-weight:700;font-size:14px;margin-bottom:3px}
.vocab-word:hover .tt{visibility:visible;opacity:1}
.nav{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:8px;align-items:center}
.hidden{display:none}
.nav-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.25)}
.nav-dots{display:flex;gap:6px;align-items:center;padding:0 8px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.nav-dot.active{background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.5)}
.nav-dot:hover{background:rgba(255,255,255,.5)}
.progress{position:fixed;top:0;left:0;right:0;z-index:60;background:rgba(255,255,255,.06);height:10px}
.progress-bar{height:100%;background:linear-gradient(90deg,#fbbf24,#22d3ee);transition:width .5s ease-out;border-radius:0 5px 5px 0;box-shadow:0 0 14px rgba(251,191,36,.4),0 0 6px rgba(34,211,238,.3)}
.slide-footer{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1px}
.logo{color:var(--text);font-weight:700;letter-spacing:.5px}
.logo .o{color:#22d3ee}
.warmup-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(52,211,153,.12);color:#34d399;margin-bottom:16px;border:1px solid rgba(52,211,153,.25)}
.hint{font-size:11px;color:rgba(255,255,255,.25);margin-top:20px;font-style:italic}
@media(max-width:640px){
  .slide h1{font-size:2rem}
  .slide h2{font-size:1.15rem}
  .slide p{font-size:.95rem}
  .slide-content{padding:24px}
}
/* Eloquenta Logo */
  .elo-logo-wrap{display:inline-flex;align-items:center;gap:10px;text-decoration:none;transition:opacity .2s}
  .elo-logo-wrap:hover{text-decoration:none;opacity:.85}
  .elo-logo-wrap .elo-wordmark{font-size:22px;font-weight:700;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;letter-spacing:-.5px;line-height:1;color:#f1f5f9}
  .elo-logo-wrap .elo-wordmark .o{color:#22d3ee}
</style>
</head>

var current = 0;

function renderSlides() {
  var container = document.getElementById('slides-container');
  var dots = document.getElementById('navDots');
  var html = '';
  var dotsHtml = '';

  SLIDES.forEach(function(s, i) {
    html += '<div class="slide' + (i === 0 ? ' active' : '') + '" id="slide-' + i + '" style="background-image:url(' + s.bg + ')">' +
      '<div class="slide-bg" style="background-image:url(' + s.bg + ')"></div>' +
      '<span class="slide-number">' + (i + 1) + ' / ' + SLIDES.length + '</span>' +
      '<div class="slide-content">';

    if (s.isTitle) {
      html += '<span class="slide-category">' + s.category + '</span>';
      html += '<h1>' + s.title + '</h1>';
      html += '<p>' + s.text + '</p>';
    } else if (s.isWarmup) {
      html += '<span class="warmup-badge">🔥 Warm-up</span>';
      html += '<h2>' + s.title + '</h2>';
      if (s.subtitle) html += '<p style="color:rgba(255,255,255,.7);font-size:1.05rem">' + s.subtitle + '</p>';
    } else if (s.isEnd) {
      html += '<span class="slide-category">' + s.category + '</span>';
      html += '<h1>' + s.title + '</h1>';
      html += '<h2>' + s.subtitle + '</h2>';
      html += '<p>' + s.text + '</p>';
    } else {
      html += '<span class="slide-category">' + s.category + '</span>';
      html += '<h2>' + s.title + '</h2>';
      if (s.subtitle) html += '<p style="color:rgba(255,255,255,.7);font-size:.95rem;margin-bottom:12px">' + s.subtitle + '</p>';
      html += '<p>' + s.text + '</p>';
      
    }

    html += '</div>';
    html += '<div class="slide-footer"> <span class="elo-wordmark">El<span class="o">o</span>quenta</span> Speaking Lesson — Business & Finance</div>';
    html += '</div>';

    dotsHtml += '<div class="nav-dot' + (i === 0 ? ' active' : '') + '" onclick="goTo(' + i + ')"></div>';
  });

  container.innerHTML = html;
  dots.innerHTML = dotsHtml;
}

function preloadImages(callback) {
  var loaded = 0, total = SLIDES.length;
  var failed = [];
  SLIDES.forEach(function(s){
    var img = new Image();
    img.onload = img.onerror = function(){
      loaded++;
      document.getElementById('loadingScreen').textContent = 'Loading slides… ' + loaded + '/' + total;
      if(loaded === total){
        if(failed.length) console.log('Failed to load:', failed);
        callback();
      }
    };
    img.src = s.bg;
  });
}

function init() {
  renderSlides();
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('slides-container').classList.remove('hidden');
  showSlide(0);
}

function showSlide(n) {
  if (n < 0 || n >= SLIDES.length) return;
  document.querySelectorAll('.slide').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-dot').forEach(function(d){ d.classList.remove('active'); });
  document.getElementById('slide-' + n).classList.add('active');
  document.querySelectorAll('.nav-dot')[n].classList.add('active');
  current = n;
  document.getElementById('progressBar').style.width = (((current + 1) / SLIDES.length) * 100) + '%';
}

function nextSlide() { showSlide(current + 1); }
function prevSlide() { showSlide(current - 1); }
function goTo(n) { showSlide(n); }

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});

var touchStartX = 0;
document.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', function(e) {
  var diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) { diff > 0 ? nextSlide() : prevSlide(); }
});

preloadImages(init);

// Shift+wheel for horizontal scroll (side scrolling)
document.addEventListener('wheel',function(e){
  if(e.shiftKey){
    e.preventDefault();
    window.scrollBy(e.deltaY, 0);
  }
},{passive:false});
</script>
