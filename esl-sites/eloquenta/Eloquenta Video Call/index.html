<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; media-src 'self' blob:; object-src 'none'; frame-ancestors 'none'">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Eloquenta Video Call</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;--bg2:#0d1117;--bg3:#111827;--bg4:#162032;
  --border:#1e3a5f;--border-light:#2a4a7f;
  --text:#e0f2fe;--text-muted:#94a3b8;--text-dim:#4a6080;
  --cyan:#22d3ee;--green:#34d399;--amber:#fbbf24;--rose:#fb7185;--violet:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;position:relative}
button{font-family:inherit}

/* ═══ STARS BG ═══ */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite;opacity:var(--op)}
@keyframes twinkle{0%,100%{opacity:var(--op)}50%{opacity:.1}}

/* ═══ LAYOUT ═══ */
.call-layout{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

/* ═══ TOP BAR ═══ */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:rgba(10,14,26,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--cyan);letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--text)}
.topbar-btn{height:32px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Orbitron',sans-serif;display:flex;align-items:center;gap:6px}
.topbar-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.topbar-icon{width:14px;height:14px;flex-shrink:0}

/* ═══ MAIN AREA ═══ */
.main-area{flex:1;display:flex;overflow:hidden}

/* ═══ VIDEO PANEL ═══ */
.video-panel{flex:1;display:flex;flex-direction:column;padding:16px;gap:12px;overflow:hidden}
.video-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0}
.video-box{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.video-box video{width:100%;height:100%;object-fit:cover}
.video-box.local video{transform:scaleX(-1)}
.video-label{position:absolute;bottom:8px;left:8px;padding:4px 10px;border-radius:6px;background:rgba(10,14,26,.7);backdrop-filter:blur(4px);font-size:10px;font-weight:700;color:var(--text-muted);font-family:'Orbitron',sans-serif}
.video-label .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.video-label .status-dot.active{background:var(--green);box-shadow:0 0 6px var(--green)}
.video-label .status-dot.inactive{background:var(--text-dim)}
.video-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-dim)}
.placeholder-icon{width:48px;height:48px;opacity:.3}
.video-placeholder .text{font-size:11px}
.video-box.connecting{border-color:var(--amber)}
.video-box.connected{border-color:var(--green);box-shadow:0 0 20px rgba(52,211,153,.1)}

/* ═══ CONTROLS BAR ═══ */
.controls-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;flex-shrink:0}
.ctrl-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:12px 18px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);cursor:pointer;transition:all .2s;min-width:68px}
.ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 16px rgba(34,211,238,.15);transform:translateY(-1px)}
.ctrl-btn.active{background:rgba(34,211,238,.08);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(34,211,238,.1)}
.ctrl-btn.active .ctrl-icon{stroke:var(--cyan)}
.ctrl-btn.danger{border-color:var(--rose);color:var(--rose)}
.ctrl-btn.danger:hover{background:rgba(251,113,133,.12);box-shadow:0 0 16px rgba(251,113,133,.25);transform:translateY(-1px)}
.ctrl-btn.danger .ctrl-icon{stroke:var(--rose)}
.ctrl-btn.large{padding:14px 22px;min-width:76px}
.ctrl-icon{width:22px;height:22px;flex-shrink:0}
.ctrl-label{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.call-timer{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:700;color:var(--text-dim);min-width:120px;text-align:center;letter-spacing:2px;line-height:1}
.call-timer.active{color:var(--green)}
.call-timer.warning{color:var(--amber);text-shadow:0 0 12px rgba(251,191,36,.4)}
.call-timer.danger{color:var(--rose);text-shadow:0 0 20px rgba(251,113,133,.6);animation:timerThrob 1s ease-in-out infinite}
@keyframes timerThrob{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.08)}}

/* ═══ SIDEBAR (CHAT) ═══ */
.sidebar{width:280px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.sidebar-toggle{display:none;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.5}
.chat-msg.self{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.2);align-self:flex-end;color:var(--text)}
.chat-msg.other{background:var(--bg3);border:1px solid var(--border);align-self:flex-start;color:var(--text-muted)}
.chat-msg .sender{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.chat-msg.self .sender{color:var(--cyan)}
.chat-msg.other .sender{color:var(--violet)}
.chat-msg .time{font-size:9px;color:var(--text-dim);margin-top:4px;text-align:right}
.chat-system{text-align:center;font-size:10px;color:var(--text-dim);padding:4px}
.chat-input-area{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;height:36px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none;font-family:inherit}
.chat-input:focus{border-color:var(--cyan)}
.chat-send{height:36px;padding:0 14px;border-radius:8px;border:1px solid var(--cyan);background:var(--cyan);color:var(--bg);font-size:11px;font-weight:700;cursor:pointer;font-family:'Orbitron',sans-serif;transition:all .15s}
.chat-send:hover{filter:brightness(1.1);box-shadow:0 0 12px rgba(34,211,238,.3)}

/* ═══ SETUP SCREEN ═══ */
.setup-screen{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;align-items:center;justify-content:center}
.setup-screen.hidden{display:none}
.setup-box{width:420px;max-width:90vw;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center}
.setup-box h1{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;margin-bottom:8px}
.setup-box h1 span{color:var(--cyan)}
.setup-box .subtitle{font-size:13px;color:var(--text-muted);margin-bottom:24px}
.setup-preview{width:100%;aspect-ratio:16/9;background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden;position:relative}
.setup-preview video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.setup-preview .no-video{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:12px}
.setup-controls{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.setup-btn{display:flex;align-items:center;gap:8px;height:40px;padding:0 20px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'Orbitron',sans-serif;transition:all .15s}
.setup-icon{width:18px;height:18px;flex-shrink:0}
.setup-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.setup-btn.active{background:rgba(34,211,238,.1);border-color:var(--cyan);color:var(--cyan)}
.setup-btn.danger{border-color:var(--rose);color:var(--rose)}
.setup-btn.danger:hover{background:rgba(251,113,133,.1)}
.join-btn{width:100%;height:44px;border-radius:10px;border:1px solid var(--green);background:var(--green);color:var(--bg);font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.join-btn:hover{filter:brightness(1.1);box-shadow:0 0 20px rgba(52,211,153,.3)}
.join-btn:disabled{opacity:.4;cursor:not-allowed}

/* ═══ RESPONSIVE ═══ */
.chat-toggle-btn{display:none}
@media(max-width:700px){
  .sidebar{position:fixed;right:0;top:0;bottom:0;z-index:40;transform:translateX(100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .sidebar-toggle{display:block}
  .chat-toggle-btn{display:flex}
  .video-grid{grid-template-columns:1fr}
  .video-box.local{position:absolute;bottom:80px;right:16px;width:120px;height:90px;z-index:10;border-radius:8px}
  .theme-picker-btn{width:32px;height:32px;font-size:16px}}
  
  /* Theme picker button */
  .theme-picker-btn{position:fixed;bottom:16px;right:16px;z-index:90;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .theme-picker-btn:hover{transform:scale(1.1);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 16px rgba(34,211,238,.3)}
  .theme-picker-btn:active{transform:scale(0.95)}
  
  /* Theme picker panel */
  .theme-picker-panel{position:fixed;bottom:60px;right:16px;z-index:90;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;width:200px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;flex-direction:column;gap:8px}
  .theme-picker-panel.open{display:flex}
  .theme-picker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .theme-picker-title{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:1px}
  .theme-picker-close{width:24px;height:24px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;border-radius:4px}
  .theme-picker-close:hover{background:var(--bg3);color:var(--text)}
  .theme-preset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .theme-preset{width:38px;height:38px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .theme-preset:hover{transform:scale(1.12);border-color:var(--cyan)}
  .theme-preset.active{border-color:#fff;box-shadow:0 0 12px rgba(34,211,238,.3)}
  
  /* Sparkle effect */
  @keyframes sparkle-fall{0%{transform:translateY(-100px) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(400px) rotate(360deg);opacity:0}}
  .sparkle{position:absolute;width:6px;height:6px;background:var(--cyan);border-radius:50%;box-shadow:0 0 8px var(--cyan);z-index:100;pointer-events:none;animation:sparkle-fall 1.2s ease-out forwards}
  
  /* Swish animation */
  @keyframes swish{0%{transform:translate(-50%,-50%) scale(0);opacity:0.8}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
  
  /* Enhanced button effects */
  .ctrl-btn:hover{transform:scale(1.08);filter:brightness(1.1)}
  .ctrl-btn:active{transform:scale(0.95)}
  .join-btn:hover{transform:scale(1.03);filter:brightness(1.1)}
  .setup-btn:hover{transform:scale(1.03)}
}
</style>
</head>
<body class="cs-mustard" data-cs-mode="dark">

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- ═══ SETUP SCREEN ═══ -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-box">
    <h1>ELOQUENT<span>A</span></h1>
    <p class="subtitle">Video Call — Peer to Peer</p>

    <div class="setup-preview" id="setupPreview">
      <video id="previewVideo" autoplay muted playsinline></video>
      <div class="no-video" id="noVideoMsg">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-dim);opacity:.4"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>

    <div class="setup-controls">

        Microphone
      </button>
    </div>

    <button class="join-btn" id="joinBtn" onclick="joinCall()">Start Call</button>
  </div>
</div>

<!-- ═══ CALL LAYOUT ═══ -->
<div class="call-layout" id="callLayout" style="display:none">
  <div class="topbar">
    <div class="logo">ELOQUENT<span>A</span></div>
    <div style="flex:1"></div>
    <button class="topbar-btn danger" onclick="leaveCall()">
      <svg class="topbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Leave
    </button>
  </div>

  <div class="main-area">
    <div class="video-panel">
      <div class="video-grid">
        <div class="video-box local" id="localBox">
          <video id="localVideo" autoplay muted playsinline></video>
          <div class="video-label">
            <span class="status-dot active"></span>
            You
          </div>
        </div>
        <div class="video-box" id="remoteBox">
          <div class="video-placeholder" id="remotePlaceholder">
            <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <div class="text">Waiting for peer...</div>
          </div>
          <video id="remoteVideo" autoplay playsinline style="display:none"></video>
          <div class="video-label" id="remoteLabel" style="display:none">
            <span class="status-dot inactive" id="remoteStatusDot"></span>
            Peer
          </div>
        </div>
      </div>

      <div class="controls-bar">
        <button class="ctrl-btn active" id="callMicBtn" onclick="callToggleMic()" title="Toggle Microphone">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <span class="ctrl-label">MIC</span>
        </button>
        <button class="ctrl-btn active" id="callCamBtn" onclick="callToggleCam()" title="Toggle Camera">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span class="ctrl-label">CAM</span>
        </button>
        <button class="ctrl-btn" id="screenShareBtn" onclick="toggleScreenShare()" title="Screen Share">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span class="ctrl-label">SCREEN</span>
        </button>
        <button class="ctrl-btn chat-toggle-btn" id="chatToggleBtn" onclick="toggleSidebar()" title="Chat">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="ctrl-label">CHAT</span>
        </button>
        <div class="call-timer" id="callTimer">00:00</div>
        <button class="ctrl-btn danger large" onclick="leaveCall()" title="Leave Call">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/></svg>
          <span class="ctrl-label">END</span>
        </button>
      </div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Chat</div>
        <button class="sidebar-toggle" onclick="toggleSidebar()">✕</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>

// ── SOUND EFFECTS ──
var audioCtx=null;
function playSwish(){
  if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type="sine";o.frequency.value=800;g.gain.value=0.08;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+0.1);
}

// ── THEME PICKER ──
var THEMES={default:"#22d3ee",ocean:"#3b82f6",forest:"#22c55e",sunset:"#f97316",rose:"#f43f5e",amber:"#f59e0b",violet:"#8b5cf6",neon:"#d946ef"};
function applyTheme(t){
  var c=THEMES[t]||THEMES.default;
  document.documentElement.style.setProperty("--cyan",c);
}

document.getElementById("themePresets").addEventListener("click",function(e){
  if(e.target.classList.contains("theme-preset")){applyTheme(e.target.dataset.theme);playSwish();}
});
document.querySelectorAll(".ctrl-btn").forEach(function(el){el.addEventListener("click",playSwish);});
var st=localStorage.getItem("elo_theme");
if(st){applyTheme(st);}

</script>
<!-- Theme picker panel -->
<div class="theme-picker-panel" id="themePickerPanel">
  <div class="theme-picker-header">
    <span class="theme-picker-title">Themes</span>
    <button class="theme-picker-close" onclick="toggleThemePicker()">✕</button>
  </div>
  <div class="theme-preset-grid" id="themePresets">
    <button class="theme-preset" data-theme="default" style="background:linear-gradient(135deg,#22d3ee,#0891b2)"></button>
