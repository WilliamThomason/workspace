<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0a0e1a">
<title>B2 First Speaking — Eloquenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cs-accent:#22d3ee;--cs-bg:#0a0e1a;--cs-text:#e0f2fe;--cs-bg-card:#111827;
  --cs-border:#1e3a5f;--cs-text-muted:#94a3b8;--cs-accent-glow:rgba(34,211,238,.2);
  --cs-accent-dim:rgba(34,211,238,.08);--cs-border-light:rgba(30,58,95,.7);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cs-bg);color:var(--cs-text);line-height:1.6;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
.bg{position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(34,211,238,.08),transparent 40%),radial-gradient(circle at 80% 80%,rgba(167,139,250,.08),transparent 40%),var(--cs-bg);z-index:-2}
.glass{background:rgba(255,255,255,.04);border:1px solid var(--cs-border);border-radius:18px;backdrop-filter:blur(14px);box-shadow:0 0 30px rgba(0,0,0,.3)}
.glow-text{text-shadow:0 0 12px var(--cs-accent-glow),0 0 24px var(--cs-accent-dim)}
.nav{position:sticky;top:0;z-index:50;background:rgba(10,14,26,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--cs-border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Space Grotesk';font-size:1.1rem;font-weight:700;color:#fff;text-decoration:none;letter-spacing:1px}
.nav-logo span{color:var(--cs-accent)}
.theme-cycle-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--cs-border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center}
.theme-dot{width:10px;height:10px;border-radius:50%;background:var(--cs-accent)}
.hero{padding:60px 24px 40px;text-align:center;max-width:760px;margin:0 auto}
.hero h1{font-size:2.6rem;margin-bottom:12px;color:var(--cs-accent)}
.hero p{color:var(--cs-text-muted);font-size:1rem;max-width:560px;margin:0 auto}
.section{max-width:1000px;margin:0 auto;padding:0 24px 80px}
.section-title{font-family:'Space Grotesk';font-size:.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--cs-text-muted);margin-bottom:18px}
.deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.deck-card{position:relative;padding:20px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:10px;transition:all .2s;min-height:160px}
.deck-card:hover{border-color:var(--cs-accent);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.3),0 0 20px var(--cs-accent-dim)}
.deck-card .badge{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:var(--cs-bg-card);border:1px solid var(--cs-border);display:flex;align-items:center;justify-content:center;font-size:12px}
.deck-card .badge.done{background:var(--cs-accent);border-color:var(--cs-accent);color:var(--cs-bg)}
.deck-card .num{font-size:.7rem;font-weight:700;color:var(--cs-accent);text-transform:uppercase;letter-spacing:1px}
.deck-card h3{font-size:1.15rem;font-weight:700}
.deck-card p{font-size:.82rem;color:var(--cs-text-muted);line-height:1.5}
.footer{text-align:center;padding:30px 24px;font-size:.75rem;color:var(--cs-text-muted);border-top:1px solid var(--cs-border)}
@media(max-width:640px){.hero h1{font-size:1.8rem}.deck-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg"></div>
<nav class="nav">
  <a href="../index.html" class="nav-logo">◆ <span>Eloquenta</span> B2 First</a>
  <button class="theme-cycle-btn" id="themeCycleBtn" title="Cycle theme"><span class="theme-dot" id="themeDot"></span></button>
</nav>

<header class="hero">
  <h1 class="glow-text">B2 First Speaking</h1>
  <p>12 topic-based practice decks covering Part 1 interview, Part 2 photo comparison, Part 3 collaborative task, and reading/listening/writing homework.</p>
</header>

<section class="section">
  <div class="section-title">Choose a topic</div>
  <div class="deck-grid" id="deckGrid"></div>
</section>

<footer class="footer">
  <p>Original FCE-style practice content for B2 learners.</p>
  <a href="../index.html" style="color:var(--cs-accent)">← Back to Eloquenta</a>
</footer>

<script>
var DECKS=[
  {id:'01-health-fitness',title:'Health & Fitness',desc:'Exercise, diet, sleep, and wellbeing.'},
  {id:'02-education-school',title:'Education & School Life',desc:'Subjects, exams, teachers, and future study.'},
  {id:'03-friends-family',title:'Friends & Family',desc:'Relationships, siblings, and social life.'},
  {id:'04-food-cooking',title:'Food & Cooking',desc:'Meals, cuisines, eating habits, and restaurants.'},
  {id:'05-shopping-money',title:'Shopping & Money',desc:'Buying habits, budgets, and saving.'},
  {id:'06-work-future',title:'Work & Future Plans',desc:'Jobs, careers, university, and ambitions.'},
  {id:'07-music-concerts',title:'Music & Concerts',desc:'Genres, live music, and listening habits.'},
  {id:'08-sports-games',title:'Sports & Games',desc:'Team sports, fitness, and competitions.'},
  {id:'09-books-reading',title:'Books & Reading',desc:'Reading habits, genres, and libraries.'},
  {id:'10-films-tv',title:'Films & TV Shows',desc:'Cinema, streaming, and favourite series.'},
  {id:'11-transport',title:'Transport & Getting Around',desc:'Public transport, cars, cycling, and travel.'},
  {id:'12-internet-ai',title:'The Internet & AI',desc:'Social media, artificial intelligence, and privacy.'}
];

var THEME_ORDER=['eloquent','wte','midnight','sunset','forest','light'];
var THEMES={
  eloquent:{accent:'#22d3ee',bg:'#0a0e1a',text:'#e0f2fe',card:'#111827',border:'#1e3a5f'},
  wte:{accent:'#a3e635',bg:'#1c1c1c',text:'#e8e8f0',card:'#232323',border:'#3a3a3a'},
  midnight:{accent:'#818cf8',bg:'#0f0f23',text:'#c7d2fe',card:'#1a1a3e',border:'#2e2e5e'},
  sunset:{accent:'#fb923c',bg:'#1a0f0a',text:'#fed7aa',card:'#2d1a10',border:'#4a2a1a'},
  forest:{accent:'#4ade80',bg:'#0a1a0f',text:'#bbf7d0',card:'#162418',border:'#2a4a2a'},
  light:{accent:'#2563eb',bg:'#f8fafc',text:'#1e293b',card:'#ffffff',border:'#e2e8f0'}
};
function applyTheme(name){
  var t=THEMES[name]; if(!t) return;
  var r=document.documentElement;
  r.style.setProperty('--cs-accent',t.accent);
  r.style.setProperty('--cs-bg',t.bg);
  r.style.setProperty('--cs-text',t.text);
  r.style.setProperty('--cs-bg-card',t.card);
  r.style.setProperty('--cs-border',t.border);
  r.style.setProperty('--cs-text-muted',t.text+'99');
  r.style.setProperty('--cs-accent-glow',t.accent+'33');
  r.style.setProperty('--cs-accent-dim',t.accent+'18');
  document.getElementById('themeDot').style.background=t.accent;
  try{localStorage.setItem('eloquent-theme',name);}catch(e){}
}
document.getElementById('themeCycleBtn').addEventListener('click',function(){
  var saved=localStorage.getItem('eloquent-theme')||'eloquent';
  var idx=THEME_ORDER.indexOf(saved);
  applyTheme(THEME_ORDER[(idx+1)%THEME_ORDER.length]);
});
applyTheme(localStorage.getItem('eloquent-theme')||'eloquent');

var progress={};
try{progress=JSON.parse(localStorage.getItem('fce-progress')||'{}');}catch(e){}

var grid=document.getElementById('deckGrid');
DECKS.forEach(function(d){
  var completed=!!progress[d.id];
  var a=document.createElement('a');
  a.className='deck-card glass';
  a.href='decks/'+d.id+'.html';
  a.innerHTML=''+
    '<span class="badge '+(completed?'done':'')+'">'+(completed?'✓':'')+'</span>'+
    '<span class="num">#'+d.id.split('-')[0]+'</span>'+
    '<h3>'+d.title+'</h3>'+
    '<p>'+d.desc+'</p>';
  grid.appendChild(a);
});
</script>
</body>
</html>
